name: ci

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./TabulaRasa/TabulaRasa.Web/package-lock.json

      - name: Restore
        run: dotnet restore ./TabulaRasa/TabulaRasa.sln

      - name: Build
        run: dotnet build --no-restore --configuration Release ./TabulaRasa/TabulaRasa.sln

      - name: Test with coverage
        run: dotnet test ./TabulaRasa/TabulaRasa.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --logger "trx" --results-directory ./TestResults

      - name: Summarize coverage
        shell: pwsh
        run: ./.github/scripts/summarize-dotnet-coverage.ps1 -CoverageRoot ./TestResults -MinimumLineCoverage 60 -BadgePath ./.github/badges/coverage.svg -SummaryPath ./coverage-summary.md

      - name: Install web dependencies
        run: npm ci
        working-directory: ./TabulaRasa/TabulaRasa.Web

      - name: Test web with coverage
        run: npm test
        working-directory: ./TabulaRasa/TabulaRasa.Web

      - name: Summarize web coverage
        shell: pwsh
        run: ./.github/scripts/summarize-vitest-coverage.ps1 -CoverageSummaryPath ./TabulaRasa/TabulaRasa.Web/coverage/coverage-summary.json -SummaryPath ./frontend-coverage-summary.md

      - name: Build web
        run: npm run build
        working-directory: ./TabulaRasa/TabulaRasa.Web
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          if git diff --quiet -- .github/badges/coverage.svg; then
            echo "Coverage badge is unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg
          git commit -m "chore: update coverage badge [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/*.trx
            TestResults/**
            coverage-summary.md
            frontend-coverage-summary.md
            TabulaRasa/TabulaRasa.Web/coverage/**
